<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="setup-page" class="page active">
        <div class="setup-container">
            <h1>Tic-Tac-Toe</h1>
            <div class="input-group">
                <label for="player1-name">Player 1 (X)</label>
                <input type="text" id="player1-name" placeholder="Enter name" value="player1">
            </div>
            <div class="input-group">
                <label for="player2-name">Player 2 (O)</label>
                <input type="text" id="player2-name" placeholder="Enter name" value="player2">
            </div>
            <button id="start-btn">Start Game</button>
        </div>
    </div>

    <div id="game-page" class="page">
        <div id="p1-info" class="player-info">
            <span id="p1-name-display" class="player-name"></span>
            <span class="player-symbol">(X)</span>
            <span id="p1-wins" class="player-wins">Wins: 0</span>
        </div>
        <div id="status"></div>
        <div id="board">
            <div class="cell" data-row="0" data-col="0"></div>
            <div class="cell" data-row="0" data-col="1"></div>
            <div class="cell" data-row="0" data-col="2"></div>
            <div class="cell" data-row="1" data-col="0"></div>
            <div class="cell" data-row="1" data-col="1"></div>
            <div class="cell" data-row="1" data-col="2"></div>
            <div class="cell" data-row="2" data-col="0"></div>
            <div class="cell" data-row="2" data-col="1"></div>
            <div class="cell" data-row="2" data-col="2"></div>
        </div>
        <div id="p2-info" class="player-info">
            <span id="p2-name-display" class="player-name"></span>
            <span class="player-symbol">(O)</span>
            <span id="p2-wins" class="player-wins">Wins: 0</span>
        </div>
        <div class="game-buttons">
            <button id="reset-btn">Reset Game</button>
            <button id="change-name-btn">Change Names</button>
        </div>
    </div>

    <div id="draw-dialog" class="dialog">
        <div class="dialog-content">
            <p>It's a draw!</p>
            <button id="draw-ok-btn">OK</button>
        </div>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
